# =========================================
# QuantumMind AI - Backend Configuration
# =========================================

# -----------------------------------------
# Server
# -----------------------------------------
server.port=${SERVER_PORT:8085}
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/event-stream
spring.application.name=quantummind-backend

# -----------------------------------------
# Database
# -----------------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/quantummind}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:harsh@321}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.pool-name=QuantumMindPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.auto-commit=true

# -----------------------------------------
# JPA / Hibernate
# -----------------------------------------
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# REMOVE explicit PostgreSQLDialect warning
# Hibernate auto-detects it in Spring Boot 3+
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# -----------------------------------------
# JWT
# -----------------------------------------
jwt.secret=${JWT_SECRET:TXlRdWFudHVtTWluZEpXVFNlY3JldEtleTIwMjZTdXBlclNlY3VyZUtleQ==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# -----------------------------------------
# AI Service
# -----------------------------------------
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# -----------------------------------------
# File Uploads
# -----------------------------------------
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}

# -----------------------------------------
# CORS
# -----------------------------------------
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# -----------------------------------------
# Async Execution
# -----------------------------------------
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=qm-async-

# -----------------------------------------
# Spring Actuator
# -----------------------------------------
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoints.web.exposure.include=health,info,metrics
management.info.env.enabled=true

info.app.name=QuantumMind AI
info.app.version=1.0.0

# -----------------------------------------
# Logging
# -----------------------------------------
logging.level.root=INFO
logging.level.com.quantummind=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=INFO

logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n